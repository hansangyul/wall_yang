<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>진짜 보이는 우주 시뮬레이터</title>
<style>
body { margin:0; background:black; overflow:hidden; }
#info {
 position:absolute; top:10px; left:10px;
 background:rgba(0,0,0,0.7);
 color:white; padding:10px; border-radius:10px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="info">
선택된 행성: <span id="name">없음</span><br>
질량: <input type="range" id="mass" min="5" max="100">
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const G = 0.3;
let bodies = [];
let selected = null;

// 기본 행성 몇 개 크게 생성
function addPlanet(x,y,vx,vy,color){
 bodies.push({
   x,y,vx,vy,
   mass:20,
   radius:10,
   color,
   trail:[]
 });
}

addPlanet(300,300,0,2,"blue");
addPlanet(600,300,0,-2,"red");
addPlanet(500,500,2,0,"green");

// 클릭 선택
canvas.onclick = (e)=>{
 selected = null;
 bodies.forEach(b=>{
   let dx=b.x-e.clientX;
   let dy=b.y-e.clientY;
   if(Math.sqrt(dx*dx+dy*dy)<b.radius){
     selected=b;
   }
 });
 document.getElementById("name").innerText = selected ? "행성 선택됨" : "없음";
};

// 드래그 생성
let dragging=false,startX,startY;

canvas.onmousedown=(e)=>{
 dragging=true;
 startX=e.clientX;
 startY=e.clientY;
};

canvas.onmouseup=(e)=>{
 dragging=false;
 let vx=(e.clientX-startX)*0.1;
 let vy=(e.clientY-startY)*0.1;
 addPlanet(startX,startY,vx,vy,"white");
};

// 질량 조절
document.getElementById("mass").oninput=(e)=>{
 if(selected){
   selected.mass=parseFloat(e.target.value);
   selected.radius=selected.mass*0.3;
 }
};

// 중력
function gravity(b1,b2){
 let dx=b2.x-b1.x;
 let dy=b2.y-b1.y;
 let dist=Math.sqrt(dx*dx+dy*dy);

 if(dist<5) return;

 let force=G*b1.mass*b2.mass/(dist*dist);
 b1.vx+=force*dx/dist/b1.mass;
 b1.vy+=force*dy/dist/b1.mass;
}

// 업데이트
function update(){
 for(let i=0;i<bodies.length;i++){
   for(let j=0;j<bodies.length;j++){
     if(i!==j) gravity(bodies[i],bodies[j]);
   }
 }

 bodies.forEach(b=>{
   b.x+=b.vx;
   b.y+=b.vy;

   b.trail.push({x:b.x,y:b.y});
   if(b.trail.length>50) b.trail.shift();
 });
}

// 그리기
function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 bodies.forEach(b=>{
   // 궤도
   ctx.beginPath();
   b.trail.forEach((p,i)=>{
     if(i==0) ctx.moveTo(p.x,p.y);
     else ctx.lineTo(p.x,p.y);
   });
   ctx.strokeStyle=b.color;
   ctx.lineWidth=2;
   ctx.stroke();

   // 행성
   ctx.beginPath();
   ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
   ctx.fillStyle=b.color;
   ctx.fill();

   // 선택 표시
   if(b===selected){
     ctx.strokeStyle="yellow";
     ctx.lineWidth=3;
     ctx.stroke();
   }
 });

 // 드래그 방향선
 if(dragging){
   ctx.beginPath();
   ctx.moveTo(startX,startY);
   ctx.lineTo(event.clientX,event.clientY);
   ctx.strokeStyle="white";
   ctx.stroke();
 }
}

// 루프
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
