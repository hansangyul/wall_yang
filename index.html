<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>태양계 시뮬레이터</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: sans-serif;
        overflow: hidden;
    }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.6);
        padding: 10px;
        border-radius: 10px;
    }
    input {
        width: 100px;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
    <div>속도: <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1"></div>
    <div>시간 배속: <input type="range" id="time" min="0.1" max="5" step="0.1" value="1"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const G = 0.1; // 중력 상수 (단순화)

let timeScale = 1;

document.getElementById("time").oninput = e => {
    timeScale = parseFloat(e.target.value);
};

// 태양
const sun = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    mass: 10000,
    radius: 20
};

// 행성 + 위성
let bodies = [
    {
        name: "지구",
        x: sun.x + 150,
        y: sun.y,
        vx: 0,
        vy: 2,
        mass: 10,
        radius: 6,
        color: "blue",
        moons: [
            {
                x: 150,
                y: 0,
                vx: 0,
                vy: 3,
                radius: 2
            }
        ]
    }
];

// 중력 계산
function applyGravity(body) {
    let dx = sun.x - body.x;
    let dy = sun.y - body.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let force = G * sun.mass / (dist * dist);

    body.vx += force * dx/dist;
    body.vy += force * dy/dist;
}

// 업데이트
function update() {
    bodies.forEach(body => {
        applyGravity(body);

        body.x += body.vx * timeScale;
        body.y += body.vy * timeScale;

        // 위성
        body.moons.forEach(moon => {
            let dx = body.x - (body.x + moon.x);
            let dy = body.y - (body.y + moon.y);
            let dist = Math.sqrt(dx*dx + dy*dy);

            let force = 0.05 / (dist * dist);

            moon.vx += force * dx/dist;
            moon.vy += force * dy/dist;

            moon.x += moon.vx;
            moon.y += moon.vy;
        });
    });
}

// 그리기
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 태양 (빛 효과)
    let gradient = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 40);
    gradient.addColorStop(0, "yellow");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(sun.x, sun.y, 40, 0, Math.PI * 2);
    ctx.fill();

    // 행성
    bodies.forEach(body => {
        ctx.fillStyle = body.color;
        ctx.beginPath();
        ctx.arc(body.x, body.y, body.radius, 0, Math.PI * 2);
        ctx.fill();

        // 위성
        body.moons.forEach(moon => {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(body.x + moon.x, body.y + moon.y, moon.radius, 0, Math.PI * 2);
            ctx.fill();
        });
    });
}

// 루프
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
