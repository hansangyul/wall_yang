<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>중력 시뮬레이터</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const G = 0.2;
let bodies = [];

let dragging = false;
let startX, startY;

// 마우스로 생성
canvas.onmousedown = (e) => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
};

canvas.onmouseup = (e) => {
    dragging = false;

    let dx = (e.clientX - startX) * 0.1;
    let dy = (e.clientY - startY) * 0.1;

    bodies.push({
        x: startX,
        y: startY,
        vx: dx,
        vy: dy,
        mass: 10,
        radius: 5,
        trail: []
    });
};

// 중력 (모든 천체 서로 영향)
function gravity(b1, b2){
    let dx = b2.x - b1.x;
    let dy = b2.y - b1.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 5) return;

    let force = G * b1.mass * b2.mass / (dist*dist);

    let ax = force * dx/dist / b1.mass;
    let ay = force * dy/dist / b1.mass;

    b1.vx += ax;
    b1.vy += ay;
}

// 충돌 → 합쳐짐
function merge(){
    for(let i=0;i<bodies.length;i++){
        for(let j=i+1;j<bodies.length;j++){
            let dx = bodies[i].x - bodies[j].x;
            let dy = bodies[i].y - bodies[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < bodies[i].radius + bodies[j].radius){
                bodies[i].mass += bodies[j].mass;
                bodies[i].radius += 1;
                bodies.splice(j,1);
                j--;
            }
        }
    }
}

// 업데이트
function update(){
    for(let i=0;i<bodies.length;i++){
        for(let j=0;j<bodies.length;j++){
            if(i!==j){
                gravity(bodies[i], bodies[j]);
            }
        }
    }

    bodies.forEach(b=>{
        b.x += b.vx;
        b.y += b.vy;

        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>100) b.trail.shift();
    });

    merge();
}

// 그리기
function draw(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    bodies.forEach(b=>{
        // 궤도
        ctx.beginPath();
        b.trail.forEach((p,i)=>{
            if(i==0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);
        });
        ctx.strokeStyle="white";
        ctx.stroke();

        // 행성
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });

    // 드래그 표시
    if(dragging){
        ctx.beginPath();
        ctx.moveTo(startX,startY);
        ctx.lineTo(event.clientX,event.clientY);
        ctx.strokeStyle="red";
        ctx.stroke();
    }
}

// 루프
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
